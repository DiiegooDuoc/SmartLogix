server.port=8082

# Conexión MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ordersdb?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password= 
! EN LA PASSWORD, "system" SE USA PARA LOS COMPUTADORES DEL DUOC, PERO EN PERSONALES, SI LARAGON SE USA SIN CONTRASEÑA, ESE ESPACIO SE DEJA VACIO, OSEA, SIN TEXTO.

# Flyway y Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Mostrar SQL
spring.jpa.show-sql=true

spring.main.allow-bean-definition-overriding=true